name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install --break-system-packages buildozer cython
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk autoconf automake libtool pkg-config cmake build-essential libffi-dev libssl-dev python3-dev
      - name: Build APK
        run: |
          cd ${{ github.workspace }}
          export PIP_BREAK_SYSTEM_PACKAGES=1
          buildozer -v android debug
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: tapcircle-apk
          path: bin/*.apk
